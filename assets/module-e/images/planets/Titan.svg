<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="titanGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd28a"></stop>
      <stop offset="70%" stop-color="#c98a3a"></stop>
      <stop offset="100%" stop-color="#3b2412"></stop>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="45" fill="url(#titanGrad)" filter="url(#glow)"></circle>
  <ellipse cx="60" cy="70" rx="38" ry="10" fill="none" stroke="#ffdca8" opacity="0.4"></ellipse>
</svg>