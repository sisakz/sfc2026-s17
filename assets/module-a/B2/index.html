<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f2f2f2;
    padding: 24px;
  }

  .card {
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    padding: 28px 32px;
    width: 360px;
  }

  .card-title {
    font-size: 20px;
    font-weight: bold;
    color: #333;
    margin-bottom: 20px;
    text-align: center;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 14px;
    color: #555;
    margin-bottom: 6px;
  }

  input, textarea {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    resize: vertical;
  }

  textarea {
    min-height: 80px;
  }

  .error-message {
    display: none;
    font-size: 12px;
    color: #d9534f;
    margin-top: 4px;
  }

  .success-message {
    display: none;
    font-size: 14px;
    color: #2e7d32;
    background: #eaf6ec;
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 16px;
    text-align: center;
  }

  .submit-btn {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: bold;
    color: #ffffff;
    background: #4a78d4;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .submit-btn:hover {
    opacity: 0.9;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="card-title">Contact Us</div>

    <div class="success-message" id="success-message">Your message has been sent.</div>

    <form id="contact-form">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name">
        <div class="error-message" id="name-error">Name is required.</div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="text" id="email" name="email">
        <div class="error-message" id="email-error">Please enter a valid email address.</div>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message"></textarea>
        <div class="error-message" id="message-error">Message is required.</div>
      </div>

      <button type="submit" class="submit-btn">Send</button>
    </form>
  </div>

  <script>
    // TODO: implement client-side validation
  </script>

</body>
</html>
