<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Calendar</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #eef1f5;
    padding: 24px;
  }

  .calendar {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 10px rgba(30, 41, 59, 0.08);
    padding: 20px;
    width: 320px;
  }

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .nav-btn {
    width: 32px;
    height: 32px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    background: #f0f3f9;
    color: #4a78d4;
    border-radius: 6px;
    cursor: pointer;
  }

  .nav-btn:hover {
    background: #e3e9f7;
  }

  .month-label {
    font-size: 16px;
    font-weight: bold;
    color: #334155;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .weekday {
    text-align: center;
    font-size: 12px;
    font-weight: bold;
    color: #94a3b8;
    padding: 6px 0;
  }

  .day-cell {
    text-align: center;
    font-size: 14px;
    color: #334155;
    padding: 8px 0;
    border-radius: 6px;
  }

  .day-cell.empty {
    color: transparent;
  }

  .day-cell.other-month {
    color: #cbd5e1;
  }

  .day-cell.today {
    background: #4a78d4;
    color: #ffffff;
    font-weight: bold;
  }
</style>
</head>
<body>

  <div class="calendar">
    <div class="calendar-header">
      <button class="nav-btn" id="prev-btn">&lt;</button>
      <div class="month-label" id="month-label">June 2026</div>
      <button class="nav-btn" id="next-btn">&gt;</button>
    </div>

    <div class="calendar-grid">
      <div class="weekday">Sun</div>
      <div class="weekday">Mon</div>
      <div class="weekday">Tue</div>
      <div class="weekday">Wed</div>
      <div class="weekday">Thu</div>
      <div class="weekday">Fri</div>
      <div class="weekday">Sat</div>
    </div>

    <div class="calendar-grid" id="days-grid">
      <div class="day-cell other-month">31</div>
      <div class="day-cell">1</div>
      <div class="day-cell">2</div>
      <div class="day-cell">3</div>
      <div class="day-cell">4</div>
      <div class="day-cell">5</div>
      <div class="day-cell">6</div>
      <div class="day-cell">7</div>
      <div class="day-cell">8</div>
      <div class="day-cell">9</div>
      <div class="day-cell">10</div>
      <div class="day-cell">11</div>
      <div class="day-cell">12</div>
      <div class="day-cell">13</div>
      <div class="day-cell">14</div>
      <div class="day-cell">15</div>
      <div class="day-cell">16</div>
      <div class="day-cell">17</div>
      <div class="day-cell">18</div>
      <div class="day-cell">19</div>
      <div class="day-cell">20</div>
      <div class="day-cell">21</div>
      <div class="day-cell">22</div>
      <div class="day-cell">23</div>
      <div class="day-cell">24</div>
      <div class="day-cell">25</div>
      <div class="day-cell">26</div>
      <div class="day-cell">27</div>
      <div class="day-cell">28</div>
      <div class="day-cell today">29</div>
      <div class="day-cell">30</div>
      <div class="day-cell other-month">1</div>
      <div class="day-cell other-month">2</div>
      <div class="day-cell other-month">3</div>
      <div class="day-cell other-month">4</div>
    </div>
  </div>

  <script>
    // TODO: implement calendar rendering and prev/next month navigation
  </script>

</body>
</html>
