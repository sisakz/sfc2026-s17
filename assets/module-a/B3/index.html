<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Board</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #eef1f5;
    padding: 24px;
  }

  .board {
    display: flex;
    gap: 20px;
  }

  .column {
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 2px 10px rgba(30, 41, 59, 0.08);
    width: 260px;
    padding: 18px;
  }

  .column-title {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid #4a78d4;
    color: #4a78d4;
  }

  .item-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 220px;
  }

  .item {
    background: #f8f9fb;
    border: 1px solid #e3e7ee;
    border-left: 4px solid #4a78d4;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    color: #334155;
    cursor: grab;
  }
</style>
</head>
<body>

  <div class="board">

    <div class="column" id="todo-column">
      <div class="column-title">To Do</div>
      <div class="item-list" id="todo-list">
        <div class="item" draggable="true">Design login page</div>
        <div class="item" draggable="true">Set up database schema</div>
        <div class="item" draggable="true">Write API documentation</div>
      </div>
    </div>

    <div class="column" id="done-column">
      <div class="column-title">Done</div>
      <div class="item-list" id="done-list">
        <div class="item" draggable="true">Create project repository</div>
        <div class="item" draggable="true">Install dependencies</div>
      </div>
    </div>

  </div>

  <script>
  </script>

</body>
</html>
